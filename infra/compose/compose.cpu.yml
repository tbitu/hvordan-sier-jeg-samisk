services:
  api:
    build:
      context: ../..
      dockerfile: infra/containers/api.Dockerfile
    environment:
      HSJS_PROVIDER_STUB_MODE: "true"
      HSJS_PROVIDER_RUNTIME: "transformers"
      HSJS_HF_DEVICE: "cpu"
    ports:
      - "8000:8000"
  web:
    image: docker.io/library/node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    volumes:
      - ../..:/workspace:Z
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "4173:4173"
