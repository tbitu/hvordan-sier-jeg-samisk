[defaults]
base_branch = "main"

[validation.commands]
lint = "npm run lint:web"
test = "cd apps/api && python -m pytest -v"
bootstrap = "cd apps/api && pip install -e ."

[defaults.agents]
implementer = "copilot"
reviewer = "copilot"
meta_reviewer = "copilot"
implementer_model = "qwen3.6:27b-mtp-q8_0"
reviewer_model = "qwen3.6:27b-mtp-q8_0"
meta_reviewer_model = "qwen3.6:27b-mtp-q8_0"
copilot_provider_base_url = "http://localhost:11434/v1"
copilot_provider_type = "openai"
copilot_offline = true

[plan_watch.runner]
backend = "copilot"
