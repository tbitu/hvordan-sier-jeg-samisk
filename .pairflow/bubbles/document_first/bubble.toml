[agents]
implementer = "copilot"
implementer_model = "qwen3.6:35b"
implementer_copilot_provider_base_url = "http://localhost:11434/v1"
implementer_copilot_provider_type = "openai"
implementer_copilot_offline = true
reviewer = "copilot"
reviewer_model = "qwen3.6:35b"
reviewer_copilot_provider_base_url = "http://localhost:11434/v1"
reviewer_copilot_provider_type = "openai"
reviewer_copilot_offline = true
meta_reviewer = "copilot"
meta_reviewer_model = "qwen3.6:35b"
meta_reviewer_copilot_provider_base_url = "http://localhost:11434/v1"
meta_reviewer_copilot_provider_type = "openai"
meta_reviewer_copilot_offline = true

[role_mcp]
implementer = "disabled"
reviewer = "disabled"
meta_reviewer = "disabled"

[commands]
test = "pnpm test"
typecheck = "pnpm typecheck"

[notifications]
enabled = true

[local_overlay]
enabled = true
mode = "symlink"
entries = [".claude", ".mcp.json", ".env.local", ".env.production"]

[doc_contract_gates]
round_gate_applies_after = 2
